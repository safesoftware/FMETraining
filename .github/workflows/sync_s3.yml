name: Sync Entire S3 Bucket to Repo
on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight UTC
  workflow_dispatch:    # Keeps the manual button active just in case

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Sync from S3 (Public/Anonymous)
        continue-on-error: true
        run: |
          # 1. Optimize Git for long paths and special characters
          git config --global core.longpaths true
          git config --global core.quotepath false
          
          # 2. Deep clean: Delete every hidden file in every subfolder to prevent Errno 20
          find . -type f -name ".*" -not -path "./.git/*" -delete
          
          # 3. Run the sync
          aws s3 sync s3://safeskilljar/ ./ --no-sign-request \
          --exclude "*/.*"  \
          --exclude ".*" \
          --exclude "*//" \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --exclude ".gitignore" \
          --exclude "README.md" \
          --exclude "LICENSE.md" \
          --exclude "*instructor%2*" \
          --exclude "lababuse.html"  \
          --exclude "FMEAcademy.ics" \
          --exclude "strigo.html" \
          --exclude "202[0-4]*/*" || true
          
      - name: Commit and Push
        run: |
          git config --global user.name "rjcragg"
          git config --global user.email "ryan.cragg@safe.com"
          
          # Force add everything
          git add -A
          
          # Only commit and push if there are actual changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated sync from safeskilljar S3"
            git push
          else
            echo "No changes detected between S3 and GitHub."
          fi