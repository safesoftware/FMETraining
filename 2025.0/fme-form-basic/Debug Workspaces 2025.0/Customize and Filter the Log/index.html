<h2>Leave Us Feedback on This Lesson</h2>
<div id="survey-container"></div>
<p>
<script>
  // Prevent duplicate injection
  if (!document.getElementById('survey-iframe')) {

    var userId = (typeof skilljarUser !== 'undefined') ? skilljarUser.id : 'unknown';
    var lessonId = (typeof skilljarCourse !== 'undefined' && skilljarCourse.lesson) 
                    ? skilljarCourse.lesson.id : 'unknown';

    var surveyUrl = 'https://www.surveymonkey.ca/r/GTFYTPK?user_id=' + userId + '&lesson_id=' + lessonId;

    var iframe = document.createElement('iframe');
    iframe.id = 'survey-iframe';
    iframe.src = surveyUrl;
    iframe.style.width = '100%';
    iframe.style.height = '600px';
    iframe.style.border = '0';

    document.getElementById('survey-container').appendChild(iframe);
  }
</script>
</p>
