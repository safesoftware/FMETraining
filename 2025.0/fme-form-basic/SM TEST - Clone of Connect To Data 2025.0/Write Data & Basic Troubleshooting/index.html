<p>Please take a moment to share your feedback on this lesson.</p>
<div id="survey-container"></div>
<p>
<script>
  var userId = (typeof skilljarUser !== 'undefined') ? skilljarUser.id : 'unknown';
  var lessonId = (typeof skilljarCourse !== 'undefined' && skilljarCourse.lesson) 
                  ? skilljarCourse.lesson.id : 'unknown';

  var surveyUrl = 'https://www.surveymonkey.ca/r/GTFYTPK?user_id=[user_id_value]&lesson_id=[lesson_id_value]'
                  + '?user_id=' + userId
                  + '&lesson_id=' + lessonId;

  var iframe = document.createElement('iframe');
  iframe.src = surveyUrl;
  iframe.width = '100%';
  iframe.height = '600px';
  iframe.frameBorder = '0';
  document.getElementById('survey-container').appendChild(iframe);
</script>
</p>
